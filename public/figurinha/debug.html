<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug Gemini</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #111; color: #fff; }
    textarea { width: 100%; height: 120px; margin: 10px 0; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; }
    pre { background: #222; padding: 10px; overflow: auto; max-height: 400px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Debug Gemini API</h1>
  <p>Base64 da imagem (opcional):</p>
  <textarea id="b64" placeholder="Cole aqui o base64 da imagem (sem data:...) ou deixe vazio"></textarea>
  <button onclick="testar()">TESTAR API GEMINI</button>
  <pre id="result">Aguardando...</pre>

  <script>
    async function testar() {
      const b64 = document.getElementById('b64').value.trim();
      const input = [
        { type: 'text', text: 'Create a simple cartoon sticker of a soccer player' }
      ];
      if (b64) input.push({ type: 'image', mime_type: 'image/jpeg', data: b64 });

      document.getElementById('result').textContent = 'Enviando...';
      try {
        const res = await fetch('/api/gemini-debug', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ input })
        });
        const json = await res.json();
        document.getElementById('result').textContent = JSON.stringify(json, null, 2);
      } catch (e) {
        document.getElementById('result').textContent = 'Erro: ' + e.message;
      }
    }
  </script>
</body>
</html>
